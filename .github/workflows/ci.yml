name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared-package-tests:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run MatronShared package tests (host = macOS)
        working-directory: MatronShared
        env:
          # Skip pixel-comparison snapshot tests on CI — NSHostingView renders
          # differently across macOS / Xcode versions vs. local dev. Snapshots
          # remain useful for local visual review.
          MATRON_SKIP_SNAPSHOT_TESTS: "1"
        run: swift test --enable-code-coverage

  ios-build-and-test:
    runs-on: macos-15
    needs: shared-package-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -project Matron.xcodeproj -scheme Matron

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone " | head -5

      - name: Build Matron app (iOS)
        run: |
          xcodebuild build \
            -project Matron.xcodeproj \
            -scheme Matron \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run MatronTests (iOS)
        run: |
          xcodebuild test \
            -project Matron.xcodeproj \
            -scheme Matron \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

  mac-build-and-test:
    runs-on: macos-15
    needs: shared-package-tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -project Matron.xcodeproj -scheme MatronMac

      - name: Build MatronMac app
        run: |
          xcodebuild build \
            -project Matron.xcodeproj \
            -scheme MatronMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run MatronMac tests
        env:
          # Phase 3 Task 12 added Mac-side snapshot tests for the verification
          # chrome. Same rationale as the SPM job: NSHostingView renders
          # differently across macOS / Xcode versions, so pixel equality is
          # gated by an env var on CI. Snapshots remain useful for local
          # visual review.
          #
          # We set BOTH names because the `MatronMac` scheme runs two kinds of
          # snapshot tests under one `xcodebuild test` invocation:
          #   1. `MatronMacTests/SnapshotHelpers.swift` — Mac-app test bundle.
          #      Only the `TEST_RUNNER_*`-prefixed var is propagated into the
          #      runner here (xcodebuild does not inherit the parent shell's
          #      env into the test runner).
          #   2. `MatronShared/Tests/DesignSystemSnapshotTests` — SPM tests
          #      that run transitively because xcodegen wires MatronShared as
          #      a dep of MatronMac. The unprefixed var is the one that gates
          #      these (matching the `shared-package-tests` job's `swift test`).
          # Setting both means both helpers see "skip" regardless of which
          # propagation path xcodebuild takes for each bundle.
          MATRON_SKIP_SNAPSHOT_TESTS: "1"
          TEST_RUNNER_MATRON_SKIP_SNAPSHOT_TESTS: "1"
        run: |
          xcodebuild test \
            -project Matron.xcodeproj \
            -scheme MatronMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
