name: CLA
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
# The repo's default workflow permissions are read-only;
# contributor-assistant needs these four write scopes (its README's
# example block) or every run dies with "graphql call to get the
# committers details failed: Resource not accessible by integration".
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write
jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/Matronhq/matron-apple/blob/main/.cla.md'
          branch: 'main'
          allowlist: dependabot[bot]
