name: Matron
options:
  bundleIdPrefix: chat.matron
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    APP_GROUP_ID: group.chat.matron
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      ENABLE_TESTABILITY: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

packages:
  MatronShared:
    path: MatronShared
  MatrixRustSDK:
    url: https://github.com/matrix-org/matrix-rust-components-swift
    from: "26.04.01"
  # Phase 3 Task 12: snapshot tests for Mac verification chrome. SPM-side
  # snapshot suites already use this via MatronShared/Package.swift; declaring
  # here so the Xcode `MatronMacTests` target can import `SnapshotTesting`
  # too. Same pinned major as MatronShared (1.x). Resolved transitively at
  # 1.19.2 today via xcodebuild's package graph.
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Matron:
    type: application
    platform: iOS
    sources:
      - path: Matron
    info:
      path: Matron/App/Info.plist
      properties:
        CFBundleDisplayName: Matron
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.matron.app
        CODE_SIGN_ENTITLEMENTS: Matron/App/Matron.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
    entitlements:
      path: Matron/App/Matron.entitlements
      properties:
        com.apple.security.application-groups:
          - group.chat.matron
        # keychain-access-groups intentionally absent in Phase 1. iOS Simulator
        # rejects keychain ops without a signing-team-resolved access group
        # ($(AppIdentifierPrefix) doesn't expand without a team). Phase 1 stores
        # the post-login session as a JSON file via FileSessionStore (in the
        # SDK's basePath alongside its own SQLite store). Phase 3 will add
        # Keychain back when signing is wired.
    # `scheme.testTargets` populates `<Testables>` on the auto-generated
    # `Matron.xcscheme`. Without this, `xcodebuild test -scheme Matron`
    # fails with "Scheme is not currently configured for the test action"
    # — only `MatronTests` (the bundle scheme) was usable. CI uses the
    # bundle scheme, but adding the testable here lets developers run
    # the same suite from the app scheme and from Xcode's Test action.
    scheme:
      testTargets:
        - MatronTests
    dependencies:
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronStorage
      - package: MatronShared
        product: MatronSync
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronDesignSystem
      - package: MatronShared
        product: MatronVerification
      - package: MatrixRustSDK
        product: MatrixRustSDK

  MatronMac:
    type: application
    platform: macOS
    sources:
      - path: MatronMac
    info:
      path: MatronMac/App/Info.plist
      properties:
        CFBundleDisplayName: Matron
        LSApplicationCategoryType: public.app-category.social-networking
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.matron.mac
        CODE_SIGN_ENTITLEMENTS: MatronMac/App/MatronMac.entitlements
        SUPPORTED_PLATFORMS: macosx
    entitlements:
      path: MatronMac/App/MatronMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)chat.matron.mac
    # See the iOS target's `scheme.testTargets` comment — same rationale.
    scheme:
      testTargets:
        - MatronMacTests
    dependencies:
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronStorage
      - package: MatronShared
        product: MatronSync
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronDesignSystem
      - package: MatronShared
        product: MatronVerification

  MatronTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MatronTests
    settings:
      base:
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: Matron
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronVerification

  MatronMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MatronMacTests
    settings:
      base:
        SUPPORTED_PLATFORMS: macosx
    dependencies:
      - target: MatronMac
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronVerification
      # Phase 3 Task 12: Mac-side snapshot tests for the verification chrome.
      # Pixel-equality is gated behind MATRON_SKIP_SNAPSHOT_TESTS=1 on CI to
      # dodge macOS / Xcode renderer drift; baselines remain useful locally.
      - package: swift-snapshot-testing
        product: SnapshotTesting

  MatronNSE:
    type: app-extension
    platform: iOS
    sources:
      - path: MatronNSE
    info:
      path: MatronNSE/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.matron.app.nse
        CODE_SIGN_ENTITLEMENTS: MatronNSE/MatronNSE.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    entitlements:
      path: MatronNSE/MatronNSE.entitlements
      properties:
        com.apple.security.application-groups:
          - group.chat.matron
        # keychain-access-groups omitted — see note on the Matron target.
    dependencies:
      - package: MatronShared
        product: MatronStorage
      - package: MatrixRustSDK
        product: MatrixRustSDK
