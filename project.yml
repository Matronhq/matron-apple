name: Matron
options:
  bundleIdPrefix: chat.matron
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    APP_GROUP_ID: group.chat.matron
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      ENABLE_TESTABILITY: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

packages:
  MatronShared:
    path: MatronShared
  MatrixRustSDK:
    url: https://github.com/matrix-org/matrix-rust-components-swift
    from: "26.04.01"
  # Phase 3 Task 12: snapshot tests for Mac verification chrome. SPM-side
  # snapshot suites already use this via MatronShared/Package.swift; declaring
  # here so the Xcode `MatronMacTests` target can import `SnapshotTesting`
  # too. Same pinned major as MatronShared (1.x). Resolved transitively at
  # 1.19.2 today via xcodebuild's package graph.
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Matron:
    type: application
    platform: iOS
    sources:
      - path: Matron
    info:
      path: Matron/App/Info.plist
      properties:
        CFBundleDisplayName: Matron
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.matron.app
        CODE_SIGN_ENTITLEMENTS: Matron/App/Matron.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
    entitlements:
      path: Matron/App/Matron.entitlements
      properties:
        com.apple.security.application-groups:
          - group.chat.matron
        # Phase 3 / Wave 3 / M1: explicit keychain-access-group for the
        # recovery-key store. Mirrors the Mac entitlement's group entry.
        # `chat.matron` (NOT `chat.matron.app`) so Phase 4's NSE share +
        # any future MatronShared extension can be granted the same group
        # without invalidating recovery keys written today (B3 rationale).
        # iOS Simulator without a signing team cannot resolve
        # `$(AppIdentifierPrefix)` and surfaces `errSecMissingEntitlement
        # (-34018)` on every keychain op — `MatronApp.bootstrap()`'s probe
        # is gated `#if !targetEnvironment(simulator)` so dev runs stay
        # green. Real-device + signed-CI builds get the probe.
        keychain-access-groups:
          - $(AppIdentifierPrefix)chat.matron
    # `scheme.testTargets` populates `<Testables>` on the auto-generated
    # `Matron.xcscheme`. Without this, `xcodebuild test -scheme Matron`
    # fails with "Scheme is not currently configured for the test action"
    # — only `MatronTests` (the bundle scheme) was usable. CI uses the
    # bundle scheme, but adding the testable here lets developers run
    # the same suite from the app scheme and from Xcode's Test action.
    scheme:
      testTargets:
        - MatronTests
    dependencies:
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronStorage
      - package: MatronShared
        product: MatronSync
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronDesignSystem
      - package: MatronShared
        product: MatronVerification
      - package: MatrixRustSDK
        product: MatrixRustSDK

  MatronMac:
    type: application
    platform: macOS
    sources:
      - path: MatronMac
    info:
      path: MatronMac/App/Info.plist
      properties:
        CFBundleDisplayName: Matron
        LSApplicationCategoryType: public.app-category.social-networking
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.matron.mac
        SUPPORTED_PLATFORMS: macosx
      configs:
        # Debug builds use a sandbox-OFF entitlements file so XCUITest's
        # runner can establish its XPC connection to the host app for the
        # integration harness. Sandboxed Mac apps can't be UI-tested
        # without ad-hoc signing + provisioning gymnastics; for local-dev
        # + harness builds we just turn the sandbox off. Release builds
        # keep the full sandbox entitlement for App Store distribution.
        Debug:
          CODE_SIGN_ENTITLEMENTS: MatronMac/App/MatronMac.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: MatronMac/App/MatronMac.entitlements
    # Note: the target-level `entitlements:` block (xcodegen) is intentionally
    # NOT set — it overrides per-config CODE_SIGN_ENTITLEMENTS. We manage
    # the two entitlements files (MatronMac.entitlements +
    # MatronMac.Debug.entitlements) by hand and let `settings.configs` route
    # to the right one per build configuration.
    # See the iOS target's `scheme.testTargets` comment — same rationale.
    scheme:
      testTargets:
        - MatronMacTests
        - MatronMacUITests
    dependencies:
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronStorage
      - package: MatronShared
        product: MatronSync
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronDesignSystem
      - package: MatronShared
        product: MatronVerification

  MatronTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MatronTests
    settings:
      base:
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    dependencies:
      - target: Matron
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronVerification

  MatronMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MatronMacTests
    settings:
      base:
        SUPPORTED_PLATFORMS: macosx
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MatronMac
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronViewModels
      - package: MatronShared
        product: MatronVerification
      # Phase 3 Task 12: Mac-side snapshot tests for the verification chrome.
      # Pixel-equality is gated behind MATRON_SKIP_SNAPSHOT_TESTS=1 on CI to
      # dodge macOS / Xcode renderer drift; baselines remain useful locally.
      - package: swift-snapshot-testing
        product: SnapshotTesting

  # Phase 3.5 — XCUITest target for the integration harness. Drives the
  # Mac app through real UI flows (sign-in, verify, recovery) so the harness
  # in `tests/integration/` can exercise end-to-end scenarios without a
  # human in the loop. Driven by `tests/integration/scenarios/*.sh`.
  MatronMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: MatronMacUITests
    settings:
      base:
        SUPPORTED_PLATFORMS: macosx
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MatronMac

  # Phase 3.5 — SDK integration tests. Drives `MatronShared`'s public
  # surface (AuthService, VerificationServiceLive, RecoveryKeyManager)
  # directly against a live homeserver. Bypasses the UI, so it catches
  # protocol/lifecycle/SDK bugs without the App Sandbox + XCUITest
  # complexity. Skipped by default; enabled via env var
  # `MATRON_INTEGRATION_HOMESERVER` (set by `tests/integration/scenarios/*.sh`).
  MatronIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MatronIntegrationTests
    settings:
      base:
        SUPPORTED_PLATFORMS: macosx
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MatronMac
      - package: MatronShared
        product: MatronAuth
      - package: MatronShared
        product: MatronModels
      - package: MatronShared
        product: MatronStorage
      - package: MatronShared
        product: MatronSync
      - package: MatronShared
        product: MatronVerification
      - package: MatronShared
        product: MatronChat
      - package: MatronShared
        product: MatronViewModels

  MatronNSE:
    type: app-extension
    platform: iOS
    sources:
      - path: MatronNSE
    info:
      path: MatronNSE/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: chat.matron.app.nse
        CODE_SIGN_ENTITLEMENTS: MatronNSE/MatronNSE.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    entitlements:
      path: MatronNSE/MatronNSE.entitlements
      properties:
        com.apple.security.application-groups:
          - group.chat.matron
        # keychain-access-groups omitted — see note on the Matron target.
    dependencies:
      - package: MatronShared
        product: MatronStorage
      - package: MatrixRustSDK
        product: MatrixRustSDK
